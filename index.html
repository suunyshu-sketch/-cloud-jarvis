<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Cloud Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00d4ff;
    --cyan2: #00fff7;
    --blue: #0066ff;
    --dark: #000a14;
    --panel: rgba(0,30,60,0.85);
    --border: rgba(0,212,255,0.25);
    --text: #c8f0ff;
    --dim: rgba(0,212,255,0.5);
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { 0%{background-position:0 0} 100%{background-position:40px 40px} }

  /* Scanline */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,
      transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 1;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 10;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(0,10,25,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 900;
    letter-spacing: 0.3em;
    background: linear-gradient(90deg, var(--cyan), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
  }

  .status-bar {
    display: flex; gap: 20px; align-items: center; font-size: 0.7rem;
    color: var(--dim); letter-spacing: 0.1em;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s ease-in-out infinite;
  }
  .dot.offline { background: #ff4444; box-shadow: 0 0 8px #ff4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Main layout ── */
  main {
    flex: 1; display: flex; flex-direction: column;
    max-width: 900px; width: 100%; margin: 0 auto;
    padding: 20px 16px; gap: 16px;
    position: relative; z-index: 5;
  }

  /* ── Arc Reactor / Avatar ── */
  .arc-reactor {
    display: flex; justify-content: center; padding: 10px 0 0;
  }
  .reactor-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.1);
    animation: reactorSpin 8s linear infinite;
  }
  @keyframes reactorSpin {
    0%{ box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.1), 0 0 0 0 rgba(0,212,255,0); }
    50%{ box-shadow: 0 0 40px rgba(0,212,255,0.6), inset 0 0 30px rgba(0,212,255,0.2), 0 0 60px rgba(0,212,255,0.1); }
    100%{ box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.1), 0 0 0 0 rgba(0,212,255,0); }
  }
  .reactor-ring::before {
    content: ''; position: absolute; inset: 6px;
    border-radius: 50%; border: 1px solid rgba(0,212,255,0.4);
  }
  .reactor-core {
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--cyan2) 30%, var(--blue) 70%, transparent 100%);
    box-shadow: 0 0 20px var(--cyan2), 0 0 40px var(--cyan);
  }
  .reactor-ring.talking .reactor-core {
    animation: talkPulse 0.3s ease-in-out infinite alternate;
  }
  @keyframes talkPulse {
    from { transform: scale(0.8); box-shadow: 0 0 10px var(--cyan2); }
    to { transform: scale(1.3); box-shadow: 0 0 30px var(--cyan2), 0 0 50px var(--cyan); }
  }

  /* ── Chat window ── */
  .chat-window {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    min-height: 340px;
    max-height: 420px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
    backdrop-filter: blur(10px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex; gap: 10px; align-items: flex-start;
    animation: msgIn 0.3s ease-out;
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .msg-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.15em; padding-top: 3px;
    min-width: 60px;
  }
  .msg.user .msg-label { color: #88ccff; }
  .msg.jarvis .msg-label { color: var(--cyan); }

  .msg-text {
    font-size: 0.88rem; line-height: 1.6;
    color: var(--text);
  }
  .msg.jarvis .msg-text { color: #e0f8ff; }

  .thinking-dots span {
    animation: blink 1.2s ease-in-out infinite;
    color: var(--cyan);
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* ── Input area ── */
  .input-area {
    display: flex; gap: 10px; align-items: stretch;
  }

  #textInput {
    flex: 1;
    background: rgba(0,30,60,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cyan2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--cyan);
  }
  #textInput::placeholder { color: rgba(0,212,255,0.3); }
  #textInput:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 15px rgba(0,212,255,0.15);
  }

  .btn {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(0,30,60,0.9);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 60px;
  }
  .btn:hover:not(:disabled) {
    background: rgba(0,212,255,0.1);
    border-color: var(--cyan);
    box-shadow: 0 0 15px rgba(0,212,255,0.2);
  }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #voiceBtn {
    background: rgba(0,30,60,0.9);
    border-color: rgba(0,212,255,0.3);
    font-size: 1.1rem;
    padding: 0 14px;
  }
  #voiceBtn.listening {
    background: rgba(0,212,255,0.12);
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
    animation: voicePulse 1s ease-in-out infinite;
  }
  @keyframes voicePulse {
    0%,100%{ box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    50%{ box-shadow: 0 0 25px rgba(0,212,255,0.5); }
  }

  /* ── Quick commands ── */
  .quick-cmds {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .quick-btn {
    background: rgba(0,30,60,0.6);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 20px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .quick-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan2);
    background: rgba(0,212,255,0.08);
  }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 16px; justify-content: center;
    font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em;
    padding: 4px 0;
  }
  .stats span { display: flex; gap: 6px; align-items: center; }
  .stats .val { color: var(--cyan); }

  /* ── Welcome message ── */
  .welcome {
    text-align: center; padding: 20px 10px;
    color: var(--dim);
    font-size: 0.8rem;
    line-height: 1.8;
  }
  .welcome strong {
    display: block;
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem; color: var(--cyan);
    margin-bottom: 8px;
    letter-spacing: 0.2em;
  }

  @media (max-width: 480px) {
    .logo { font-size: 1rem; }
    .status-bar { display: none; }
    .chat-window { min-height: 280px; max-height: 360px; }
    .quick-cmds { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">J.A.R.V.I.S</div>
  <div class="status-bar">
    <div id="statusDot" class="dot offline"></div>
    <span id="statusText">CONNECTING...</span>
    <span>CLOUD EDITION v2.0</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<main>
  <div class="arc-reactor">
    <div class="reactor-ring" id="reactor">
      <div class="reactor-core"></div>
    </div>
  </div>

  <div class="stats">
    <span>MESSAGES <span class="val" id="msgCount">0</span></span>
    <span>MEMORY <span class="val" id="memStatus">ACTIVE</span></span>
    <span>UPLINK <span class="val" id="pingStatus">--</span></span>
  </div>

  <div class="chat-window" id="chatWindow">
    <div class="welcome">
      <strong>SYSTEM ONLINE</strong>
      Good to have you back, Sir. All systems are operational.<br>
      Voice input, memory, weather and search — fully armed.<br>
      How may I be of service?
    </div>
  </div>

  <div class="quick-cmds">
    <button class="quick-btn" onclick="sendQuick('What\'s the weather today?')">🌤 Weather</button>
    <button class="quick-btn" onclick="sendQuick('Give me the latest news')">📰 News</button>
    <button class="quick-btn" onclick="sendQuick('System status report')">⚡ Status</button>
    <button class="quick-btn" onclick="sendQuick('Tell me something interesting')">🧠 Trivia</button>
    <button class="quick-btn" onclick="sendQuick('What do you remember about me?')">💾 Memory</button>
    <button class="quick-btn" onclick="clearMemory()">🗑 Clear Memory</button>
  </div>

  <div class="input-area">
    <input type="text" id="textInput" placeholder="Speak to JARVIS... or type here" autocomplete="off" />
    <button class="btn" id="voiceBtn" title="Voice Input" onclick="toggleVoice()">🎤</button>
    <button class="btn" id="sendBtn" onclick="sendMessage()">SEND</button>
  </div>
</main>

<script>
  // ── WebSocket ──
  let ws = null;
  let msgCount = 0;
  let recognition = null;
  let isListening = false;
  let isSpeaking = false;

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      document.getElementById('statusDot').className = 'dot';
      document.getElementById('statusText').textContent = 'ONLINE';
      document.getElementById('pingStatus').textContent = 'OK';
    };

    ws.onclose = () => {
      document.getElementById('statusDot').className = 'dot offline';
      document.getElementById('statusText').textContent = 'RECONNECTING';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      document.getElementById('pingStatus').textContent = 'ERR';
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'thinking') {
        showThinking();
      } else if (data.type === 'response') {
        removeThinking();
        addMessage('jarvis', data.text);
        speak(data.text);
        msgCount++;
        document.getElementById('msgCount').textContent = msgCount;
        document.getElementById('reactor').classList.remove('talking');
      }
    };
  }

  connectWS();

  // ── Clock ──
  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().split(' ')[0];
  }, 1000);

  // ── Messages ──
  function addMessage(role, text) {
    const win = document.getElementById('chatWindow');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'YOU' : 'JARVIS'}</div>
      <div class="msg-text">${escapeHtml(text)}</div>`;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
  }

  function showThinking() {
    const win = document.getElementById('chatWindow');
    const div = document.createElement('div');
    div.className = 'msg jarvis'; div.id = 'thinking';
    div.innerHTML = `<div class="msg-label">JARVIS</div>
      <div class="msg-text thinking-dots"><span>●</span><span>●</span><span>●</span></div>`;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
    document.getElementById('reactor').classList.add('talking');
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ── Send ──
  function sendMessage() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    addMessage('user', text);
    ws.send(JSON.stringify({text}));
    input.value = '';
    document.getElementById('sendBtn').disabled = true;
    setTimeout(() => document.getElementById('sendBtn').disabled = false, 2000);
  }

  function sendQuick(text) {
    document.getElementById('textInput').value = text;
    sendMessage();
  }

  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Voice Input ──
  function toggleVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      addMessage('jarvis', "Voice recognition is not supported in this browser, Sir. Please use Chrome.");
      return;
    }
    if (isListening) { stopListening(); return; }
    startListening();
  }

  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-IN';

    recognition.onstart = () => {
      isListening = true;
      document.getElementById('voiceBtn').classList.add('listening');
      document.getElementById('voiceBtn').textContent = '🔴';
      document.getElementById('textInput').placeholder = 'Listening...';
    };

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('textInput').value = transcript;
      if (e.results[e.results.length - 1].isFinal) {
        stopListening();
        sendMessage();
      }
    };

    recognition.onerror = () => stopListening();
    recognition.onend = () => stopListening();
    recognition.start();
  }

  function stopListening() {
    isListening = false;
    document.getElementById('voiceBtn').classList.remove('listening');
    document.getElementById('voiceBtn').textContent = '🎤';
    document.getElementById('textInput').placeholder = 'Speak to JARVIS... or type here';
    if (recognition) { try { recognition.stop(); } catch(e){} }
  }

  // ── Voice Output (TTS) ──
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    // Clean text for speech
    const clean = text.replace(/[*_`#]/g, '').replace(/\n/g, '. ');
    const utter = new SpeechSynthesisUtterance(clean);
    utter.rate = 0.95; utter.pitch = 0.85; utter.volume = 1;
    // Try to use a deep male voice
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
      v.name.toLowerCase().includes('male') ||
      v.name.includes('Daniel') ||
      v.name.includes('Google UK English Male') ||
      v.name.includes('Microsoft David')
    );
    if (preferred) utter.voice = preferred;
    window.speechSynthesis.speak(utter);
  }

  // Load voices
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

  // ── Clear Memory ──
  async function clearMemory() {
    const r = await fetch('/memory', {method: 'DELETE'});
    const d = await r.json();
    addMessage('jarvis', d.status || 'Memory cleared.');
    document.getElementById('memStatus').textContent = 'CLEARED';
    setTimeout(() => document.getElementById('memStatus').textContent = 'ACTIVE', 3000);
  }
</script>
</body>
</html>
